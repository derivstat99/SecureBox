spring.application.name=SecureBox

# PostgreSQL (local)
spring.datasource.url=jdbc:postgresql://localhost:5432/securebox
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary (set these as env vars on your machine)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# JWT
jwt.secret=${JWT_SECRET:SecureBoxDefaultSecretKeyForLocalDevOnlyChangeInProduction1234567890}
jwt.expiration-ms=86400000

# Gemini AI (never commit the real key — set as env var)
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.0-flash
gemini.max-input-chars=30000
